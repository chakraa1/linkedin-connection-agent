generate_boolean_search_task:
  description: >
    Generate 6-9 LinkedIn People Search Boolean strings for {sender_name}
    ({sender_role} at {sender_company}) to support this goal: {goal}.

    Goal context: {goal_description}

    Target description: {target_description}
    Target roles: {target_roles}
    Industries: {industries}
    Locations: {locations}
    Keywords: {keywords}

    Segment breakdown: {segments}

    LINKEDIN BOOLEAN SEARCH RULES (critical — queries that break these return zero results):
    1. Maximum 2 AND-joined keyword groups per query — 3+ drops to zero results.
       GOOD: (titles) AND ("keyword1" OR "keyword2")
       GOOD: (titles) AND ("keyword1" OR "keyword2") AND ("industry1" OR "industry2")
       BAD:  (titles) AND (keywords) AND (industry) AND (company) — too many AND groups
    2. Use title:"..." for job titles — these go into LinkedIn's native title filter.
    3. Keyword groups search across full profile text (headline, about, experience, education).
       School names (IIM, ISB, IIT) and company names (McKinsey, Goldman Sachs) are valid keywords.
    4. Do NOT use "LinkedIn Top Voice" — it is a platform badge, not profile text.
    5. Keep each query under 200 characters total.
    6. Use AND, OR, NOT in UPPERCASE only.

    PROVEN PATTERNS (use these as templates):
    - Title + industry:   (title:"CTO" OR title:"VP Engineering") AND ("Banking" OR "Fintech")
    - Title + school:     (title:"CTO" OR title:"Head of Engineering") AND ("IIM" OR "ISB" OR "IIT")
    - Title + firm name:  (title:"Partner" OR title:"Managing Director") AND ("McKinsey" OR "BCG" OR "Bain & Company")
    - Title + bank name:  (title:"Head of Engineering" OR title:"Managing Director") AND ("Goldman Sachs" OR "JP Morgan" OR "Barclays")
    - Title + role signal:(title:"CTO" OR title:"Managing Director") AND ("Speaker" OR "Author" OR "Advisor") AND ("Banking" OR "Fintech")

  expected_output: >
    A JSON array of search strings with segment and rationale. Valid JSON only, no prose.
    [
      {
        "segment": "SEGMENT NAME",
        "query": "(title:\"Role1\" OR title:\"Role2\") AND (\"keyword1\" OR \"keyword2\")",
        "rationale": "One sentence explaining what this query surfaces and why"
      }
    ]
    (6-9 entries total, valid JSON array only)
